<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patel Hardware – Register</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
<div class="auth-card">
    <h1>Patel Hardware</h1>
    <div id="msg" class="msg" style="display:none;"></div>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" required>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" required>
    <button class="btn-primary" onclick="register()">Register</button>
    <div class="link-row">
        Already registered? <a href="login.html">Login here</a>
    </div>
</div>
<script>
    function showMsg(text, type) {
        var el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
        el.style.display = 'block';
    }
    function register() {
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        if (!username || !password) {
            showMsg('Please fill out all fields.', 'error');
            return;
        }
        var params = new URLSearchParams();
        params.append('username', username);
        params.append('password', password);
        fetch('/PatelHardware/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                showMsg(data.message, 'success');
                setTimeout(function() { window.location.href = '/PatelHardware/html/login.html'; }, 1500);
            } else {
                showMsg(data.message || 'Registration failed.', 'error');
            }
        })
        .catch(function() {
            showMsg('Server error. Please try again.', 'error');
        });
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') register();
    });
</script>
</body>
</html>
