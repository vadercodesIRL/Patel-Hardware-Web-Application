<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patel Hardware – View Cart</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar">
    <a href="/PatelHardware/html/main.html">Home</a>
    <a href="/PatelHardware/html/viewall.html">View All Items</a>
    <a href="/PatelHardware/html/buy.html">Buy an Item</a>
    <a href="/PatelHardware/html/cart.html">View Cart</a>
    <div class="search-wrap">
        <input type="text" id="navSearch" placeholder="Search Items">
        <button onclick="doSearch()">&#128269;</button>
    </div>
</nav>
<div class="content">
    <h2>View Cart Items</h2>
    <div id="msg" class="msg" style="display:none;"></div>
    <table id="cartTable">
        <thead>
            <tr>
                <th>ITEM#</th><th>NAME</th><th>COLOR</th><th>DESCRIPTION</th><th>PRICE</th><th>AVAILABLE</th>
            </tr>
        </thead>
        <tbody id="cartBody">
            <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
        </tbody>
    </table>
    <br>
    <a href="/PatelHardware/html/main.html">Go back to Main Menu</a>
</div>
<script>
    function doSearch() {
        var q = document.getElementById('navSearch').value.trim();
        if (q) window.location.href = '/PatelHardware/html/search.html?query=' + encodeURIComponent(q);
    }
    document.getElementById('navSearch').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doSearch();
    });
    fetch('/PatelHardware/cart')
        .then(function(res) {
            if (res.status === 401) { window.location.href = '/PatelHardware/html/login.html'; }
            return res.json();
        })
        .then(function(data) {
            if (data.error) {
                var msg = document.getElementById('msg');
                msg.textContent = data.error;
                msg.className = 'msg error';
                msg.style.display = 'block';
                return;
            }
            var tbody = document.getElementById('cartBody');
            tbody.innerHTML = '';
            if (!data.items || data.items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Your cart is empty.</td></tr>';
                return;
            }
            data.items.forEach(function(item) {
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td>' + item.itemId + '</td>' +
                    '<td>' + item.name + '</td>' +
                    '<td>' + item.color + '</td>' +
                    '<td>' + item.description + '</td>' +
                    '<td>R' + parseFloat(item.price).toFixed(0) + '</td>' +
                    '<td>' + (item.available ? 'Yes' : 'No') + '</td>';
                tbody.appendChild(tr);
            });
            var totalTr = document.createElement('tr');
            totalTr.className = 'total-row';
            totalTr.innerHTML = '<td colspan="4"></td><td>TOTAL</td><td>R' + parseFloat(data.total).toFixed(0) + '</td>';
            tbody.appendChild(totalTr);
        })
        .catch(function() { window.location.href = '/PatelHardware/html/login.html'; });
</script>
</body>
</html>
